<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Memory · 团队记忆</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
    --text: #e6e8ec; --dim: #8b93a3; --accent: #4f8cff;
    --claude:#d97706; --codex:#16a34a; --hermes:#9333ea; --trae:#2563eb; --none:#6b7280;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
         background:var(--bg); color:var(--text); }
  header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  header .total { color:var(--dim); font-size:13px; }
  .toolbar { padding:12px 24px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  #search { flex:1; min-width:240px; background:var(--panel); border:1px solid var(--border); color:var(--text);
            padding:9px 14px; border-radius:8px; font-size:14px; outline:none; }
  #search:focus { border-color:var(--accent); }
  #type-filter { background:var(--panel); border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:8px; font-size:13px; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { background:var(--panel); border:1px solid var(--border); color:var(--dim); padding:5px 11px;
          border-radius:999px; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  .chip:hover { color:var(--text); }
  .chip.active { color:#fff; border-color:transparent; }
  .chip .count { background:rgba(255,255,255,.12); padding:1px 7px; border-radius:999px; font-size:11px; }
  .chip[data-source="claude"].active { background:var(--claude); }
  .chip[data-source="codex"].active { background:var(--codex); }
  .chip[data-source="hermes"].active { background:var(--hermes); }
  .chip[data-source="trae"].active { background:var(--trae); }
  .chip[data-source=""].active { background:var(--none); }
  main { display:grid; grid-template-columns: minmax(360px, 1fr) 1.2fr; height:calc(100vh - 113px); }
  .list { overflow-y:auto; padding:12px; border-right:1px solid var(--border); }
  .detail { overflow-y:auto; padding:24px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px;
          margin-bottom:10px; cursor:pointer; transition:border-color .15s, transform .05s; }
  .card:hover { border-color:var(--accent); }
  .card.active { border-color:var(--accent); background:var(--panel2); }
  .card-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .badge { font-size:11px; padding:2px 9px; border-radius:999px; font-weight:600; color:#fff; }
  .badge.source-claude { background:var(--claude); }
  .badge.source-codex { background:var(--codex); }
  .badge.source-hermes { background:var(--hermes); }
  .badge.source-trae { background:var(--trae); }
  .badge.source-none, .badge.source- { background:var(--none); }
  .type { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
  .version { margin-left:auto; font-size:11px; color:var(--accent); font-family:ui-monospace,Menlo,monospace; }
  .card-title { font-size:14px; font-weight:500; line-height:1.4; }
  .card-meta { display:flex; gap:10px; align-items:center; margin-top:8px; font-size:12px; color:var(--dim); flex-wrap:wrap; }
  .tag { background:var(--panel2); padding:1px 7px; border-radius:4px; font-size:11px; }
  .empty { color:var(--dim); text-align:center; padding:40px 0; font-size:13px; }
  h2 { margin:0 0 12px; font-size:18px; line-height:1.35; }
  h3 { font-size:13px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; margin:24px 0 8px; }
  .meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; font-size:13px; }
  .meta-grid > div { display:flex; flex-direction:column; gap:2px; }
  .meta-grid label { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.4px; }
  .meta-grid .full { grid-column:1/-1; }
  .rel { color:var(--accent); cursor:pointer; margin-right:10px; text-decoration:underline; font-family:ui-monospace,Menlo,monospace; font-size:12px; }
  pre.body { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px;
             white-space:pre-wrap; word-break:break-word; font-size:13px; line-height:1.6;
             font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  ul.commits { list-style:none; padding:0; margin:0; font-size:13px; }
  ul.commits li { padding:7px 0; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:center; }
  ul.commits code { background:var(--panel2); padding:2px 7px; border-radius:4px; color:var(--accent); font-size:12px; }
  ul.commits .date { color:var(--dim); font-size:12px; min-width:84px; }
  @media (max-width: 820px) { main { grid-template-columns:1fr; height:auto; } .list { border-right:none; border-bottom:1px solid var(--border); } }
</style>
</head>
<body>
<header>
  <h1>🧠 Team Memory</h1>
  <span class="total" id="total">加载中…</span>
</header>
<div class="toolbar">
  <input id="search" placeholder="检索记忆（标题 / 正文 / 标签 / 作者 / 来源 / id）…" autocomplete="off">
  <div class="chips" id="source-filter"></div>
  <select id="type-filter">
    <option value="">全部类型</option>
    <option value="project">project</option>
    <option value="code">code</option>
    <option value="decision">decision</option>
    <option value="error">error</option>
    <option value="skill">skill</option>
  </select>
</div>
<main>
  <section class="list" id="list"></section>
  <aside class="detail" id="detail"><p class="empty">点击左侧记忆查看详情、来源、入库时间与版本历史</p></aside>
</main>
<script>
let all = [];
let statsData = { total: 0, sources: {}, types: {} };
let curSource = null, curType = null, curQuery = '', curId = null;

const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const badge = s => `<span class="badge source-${s||'none'}">${s || '未标注'}</span>`;
const API = p => fetch(p).then(r => r.json());

async function loadStats() {
  statsData = await API('/api/stats');
  document.getElementById('total').textContent = `共 ${statsData.total} 条记忆`;
  renderChips();
}
function renderChips() {
  const order = ['claude','codex','hermes','trae'];
  const present = order.filter(s => statsData.sources[s]);
  const others = Object.keys(statsData.sources).filter(s => !order.includes(s));
  const list = present.concat(others);
  if (statsData.sources['未标注']) list.push('未标注');
  const html = [`<button class="chip ${curSource===null?'active':''}" data-source="">全部 <span class="count">${statsData.total}</span></button>`]
    .concat(list.map(s => {
      const val = s === '未标注' ? 'none' : s;
      const active = (curSource === val) ? 'active' : '';
      return `<button class="chip ${active}" data-source="${val}">${s} <span class="count">${statsData.sources[s]}</span></button>`;
    })).join('');
  document.getElementById('source-filter').innerHTML = html;
}

async function refresh() {
  let url;
  if (curQuery) {
    url = '/api/search?q=' + encodeURIComponent(curQuery);
  } else {
    const ps = new URLSearchParams();
    if (curSource && curSource !== 'none') ps.set('source', curSource);
    if (curType) ps.set('type', curType);
    url = '/api/memories' + (ps.toString() ? '?' + ps : '');
  }
  all = await API(url);
  all.sort((a, b) => (b.created || '').localeCompare(a.created || ''));
  renderList();
}
function renderList() {
  const el = document.getElementById('list');
  if (!all.length) { el.innerHTML = '<p class="empty">无匹配记忆</p>'; return; }
  el.innerHTML = all.map(m => `
    <div class="card ${m.id===curId?'active':''}" data-id="${m.id}">
      <div class="card-head">
        ${badge(m.source)}
        <span class="type">${m.type}</span>
        <span class="version">${esc(m.version)}</span>
      </div>
      <div class="card-title">${esc(m.title)}</div>
      <div class="card-meta">
        <span>${esc(m.author || '—')}</span>
        <span>📅 ${esc(m.created || '—')}</span>
        ${m.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}
      </div>
    </div>`).join('');
  el.querySelectorAll('.card').forEach(c => c.onclick = () => showDetail(c.dataset.id));
}
function showDetail(id) {
  curId = id;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('active', c.dataset.id === id));
  const m = all.find(x => x.id === id);
  if (m) renderDetail(m);
}
function renderDetail(m) {
  const el = document.getElementById('detail');
  el.innerHTML = `
    <div class="card-head" style="margin-bottom:14px">
      ${badge(m.source)}<span class="type">${m.type} · ${m.scope}</span><span class="version">${esc(m.version)}</span>
    </div>
    <h2>${esc(m.title)}</h2>
    <div class="meta-grid">
      <div><label>ID</label><span style="font-family:ui-monospace,monospace">${esc(m.id)}</span></div>
      <div><label>作者</label><span>${esc(m.author || '—')} ${m.role ? '· '+esc(m.role) : ''}</span></div>
      <div><label>创建(入库)</label><span>${esc(m.created || '—')}</span></div>
      <div><label>最后更新</label><span>${esc(m.updated || '—')}</span></div>
      <div><label>状态</label><span>${esc(m.status)}</span></div>
      <div><label>标签</label><span>${m.tags.length ? m.tags.map(esc).join('、') : '—'}</span></div>
      ${m.related.length ? `<div class="full"><label>关联记忆</label><span>${m.related.map(r => `<a class="rel" data-id="${r}">${r}</a>`).join('')}</span></div>` : ''}
    </div>
    <h3>正文</h3>
    <pre class="body">${esc(m.body)}</pre>
    <h3>版本历史（${m.commits.length} 个提交）</h3>
    <ul class="commits">${
      m.commits.length ? m.commits.map(c => `<li><code>${c.hash}</code><span class="date">${esc(c.date)}</span><span>${esc(c.subject)}</span></li>`).join('') : '<li class="empty">未提交</li>'
    }</ul>`;
  el.querySelectorAll('.rel').forEach(a => a.onclick = () => loadRelated(a.dataset.id));
}
async function loadRelated(id) {
  const m = await API('/api/memories/' + id);
  if (m.id) renderDetail(m);
}

// 事件
let timer;
document.getElementById('search').oninput = e => {
  clearTimeout(timer);
  timer = setTimeout(() => { curQuery = e.target.value.trim(); refresh(); }, 200);
};
document.getElementById('source-filter').onclick = e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  curSource = btn.dataset.source || null;
  if (curSource === 'none') curSource = 'none';
  curQuery = ''; document.getElementById('search').value = '';
  renderChips(); refresh();
};
document.getElementById('type-filter').onchange = e => { curType = e.target.value; refresh(); };

loadStats().then(refresh);
</script>
</body>
</html>
